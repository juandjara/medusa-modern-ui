server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vite hashes asset filenames — safe to cache for a year.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback so React Router routes resolve on hard refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html is the only entrypoint that pins the current asset hashes;
    # never let intermediaries serve a stale copy.
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
