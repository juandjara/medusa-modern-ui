name: e2e

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Version comes from the packageManager field in package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium

      # Builds the pinned clean pymedusa/Medusa from its git URL, seeds the
      # fixture, serves the production build behind the vite preview proxy
      # and runs the suite (see e2e/ and playwright.config.ts).
      - run: pnpm e2e
        env:
          CI: "true"

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
