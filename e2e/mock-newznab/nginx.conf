# Minimal Newznab mock: /api?t=caps serves capabilities, any other /api
# query serves the canned tvsearch results. Medusa filters results itself by
# parsing release titles, so one static result set works for every query.
server {
    listen 80;
    root /usr/share/nginx/html;
    default_type application/xml;

    location = /api {
        if ($arg_t = caps) {
            rewrite ^ /caps.xml break;
        }
        rewrite ^ /tvsearch.xml break;
    }
}
